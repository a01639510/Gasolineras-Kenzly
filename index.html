<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario IP — Informe Preventivo ASEA (Verde Raíz)</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="theme-color" content="#0e3b29">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#0f6b46; --verde2:#0c5638; --verde-dark:#0a2c1f; --verde-claro:#f2f4f3; --verde-tint:#e9f3ee;
    --oro:#b8923f; --gris:#6b7280; --linea:#ececef; --bg:#fbfbfc; --surface:#ffffff;
    --amber:#9a7b1f; --amber-bg:#fbf6e7; --azul:#1f4e79; --tinta:#18181b;
    --radius:14px; --radius-sm:10px; --pill:999px;
    --shadow-sm:0 1px 2px rgba(20,20,30,.05); --shadow-md:0 10px 30px rgba(20,20,40,.10);
    --hdr:56px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--tinta);background:var(--bg);-webkit-font-smoothing:antialiased;letter-spacing:-.01em}

  /* ---- Header ---- */
  header.app{background:rgba(255,255,255,.88);-webkit-backdrop-filter:saturate(140%) blur(12px);backdrop-filter:saturate(140%) blur(12px);color:var(--tinta);padding:10px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--linea)}
  header.app .brand{display:flex;align-items:center;gap:11px}
  header.app .mark{height:34px;width:34px;flex:none;display:block;border-radius:9px}
  header.app h1{font-size:14.5px;margin:0;font-weight:650;letter-spacing:-.01em;color:var(--tinta)}
  header.app .sub{font-size:11px;opacity:.62;margin-top:1px;color:var(--gris)}
  header.app .spacer{flex:1}
  header.app .hdr-actions{display:flex;align-items:center;gap:6px}

  /* ---- Buttons ---- */
  .btn{border:1px solid var(--linea);border-radius:var(--pill);padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--tinta);transition:transform .12s,box-shadow .15s,background .15s,border-color .15s;letter-spacing:.1px;white-space:nowrap}
  .btn:hover{box-shadow:var(--shadow-sm);border-color:#dcdce0}
  .btn:active{transform:translateY(1px)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.ghost{background:transparent;color:var(--gris);border:1px solid var(--linea)}
  .btn.ghost:hover{background:var(--verde-claro);color:var(--tinta)}
  .btn.amber{background:var(--verde);color:#fff;border-color:transparent}
  .btn.amber:hover{background:var(--verde2)}

  /* ---- Icon buttons (header utilities) ---- */
  .icon-btn{width:34px;height:34px;border-radius:50%;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:15px;border:1px solid var(--linea);background:var(--surface);cursor:pointer;transition:.15s;flex:none;position:relative}
  .icon-btn:hover{background:var(--verde-claro);border-color:#cfe0d6}
  .icon-btn[title]:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(20,20,30,.86);color:#fff;font-size:11px;font-family:"Inter",sans-serif;white-space:nowrap;padding:4px 9px;border-radius:6px;pointer-events:none;font-weight:500}

  /* ---- Split layout ---- */
  #split{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - var(--hdr))}
  #leftPane{overflow-y:auto;overflow-x:hidden;background:var(--bg);display:flex;flex-direction:column}
  #rightPane{display:flex;flex-direction:column;overflow:hidden;background:#f4f5f6;border-left:1px solid var(--linea)}

  /* ---- Left pane sticky topbar ---- */
  .lp-topbar{position:sticky;top:0;z-index:15;background:rgba(251,251,252,.95);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid var(--linea);padding:9px 18px;display:flex;align-items:center;gap:12px;flex:none}
  .btn-toc{border:1px solid var(--linea);background:transparent;border-radius:8px;padding:6px 11px;font-size:13px;cursor:pointer;color:var(--tinta);display:flex;align-items:center;gap:6px;font-weight:600;font-family:inherit;white-space:nowrap;transition:.15s;flex:none;line-height:1}
  .btn-toc:hover{background:var(--verde-claro);border-color:#cfe0d6}
  .btn-toc .toc-lbl{font-size:11.5px}
  .prog-wrap{flex:1;min-width:0}
  .prog-text{font-size:11.5px;font-weight:600;color:var(--tinta);margin-bottom:4px}
  .progress{height:5px;background:#e6ece8;border-radius:var(--pill);overflow:hidden}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--verde2),var(--verde));width:0;transition:width .4s;border-radius:var(--pill)}

  /* ---- TOC Drawer ---- */
  nav.toc{position:fixed;top:var(--hdr);left:0;width:272px;height:calc(100vh - var(--hdr));background:#fff;border-right:1px solid var(--linea);z-index:220;transform:translateX(-100%);transition:transform .22s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:12px 8px 28px;box-shadow:6px 0 28px rgba(0,0,0,.1)}
  nav.toc.open{transform:translateX(0)}
  .toc-backdrop{display:none;position:fixed;inset:0;z-index:219;background:rgba(0,0,0,.18)}
  .toc-backdrop.open{display:block}
  nav.toc a{display:flex;align-items:center;padding:7px 12px;font-size:12.5px;color:var(--gris);text-decoration:none;border-radius:var(--radius-sm);margin:1px 0;transition:.12s}
  nav.toc a:hover{background:var(--verde-claro);color:var(--tinta)}
  nav.toc a.active{color:var(--verde);font-weight:650;background:var(--verde-tint)}
  nav.toc .grp{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#9aa9a0;padding:16px 12px 5px;font-weight:700}
  nav.toc .toc-close-row{display:flex;justify-content:flex-end;padding:0 8px 8px;border-bottom:1px solid var(--linea);margin-bottom:4px}
  nav.toc .toc-close{border:none;background:transparent;font-size:18px;cursor:pointer;color:var(--gris);padding:4px 8px;border-radius:6px}
  nav.toc .toc-close:hover{background:var(--verde-claro)}

  /* ---- Semaphore dots ---- */
  .toc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex:none;margin-right:7px;flex-shrink:0}
  .toc-dot.green{background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.2)}
  .toc-dot.yellow{background:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.2)}

  /* ---- Form main area ---- */
  main{padding:20px 22px 40px;flex:1}
  section.card{background:var(--surface);border:1px solid var(--linea);border-radius:var(--radius);padding:24px 26px;margin-bottom:18px;scroll-margin-top:60px;box-shadow:var(--shadow-sm)}
  section.card > h2{margin:0 0 4px;font-size:16px;color:var(--verde);font-weight:700;letter-spacing:-.01em}
  section.card > .desc{font-size:12.5px;color:var(--gris);margin:6px 0 18px;line-height:1.55}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
  .field .hint{font-size:11px;color:var(--gris);font-weight:400}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--linea);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;background:#fbfdfc;transition:.15s;color:var(--tinta)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--verde2);box-shadow:0 0 0 4px rgba(26,109,74,.12);background:#fff}
  .field textarea{min-height:64px;resize:vertical}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .badge{display:inline-block;font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:var(--pill);text-transform:uppercase;letter-spacing:.4px;vertical-align:middle;margin-left:6px;border:1px solid transparent}
  .badge.cerrada{background:#eaf1f8;color:var(--azul);border-color:#d4e2f0}
  .badge.boiler{background:var(--verde-tint);color:var(--verde);border-color:#cfe0d6}
  .badge.abierta{background:var(--amber-bg);color:#7a6116;border-color:#ecdcae}
  .open-note{background:var(--amber-bg);border:1px solid #ecdcae;border-radius:var(--radius-sm);padding:11px 13px;font-size:12px;color:#6b5300;margin-bottom:13px;line-height:1.5}
  .open-note b{color:var(--amber)}
  details.boiler-prev{margin-top:6px;border:1px solid var(--linea);border-radius:6px;background:#fafcfb}
  details.boiler-prev summary{cursor:pointer;padding:7px 10px;font-size:12px;color:var(--verde);font-weight:600}
  details.boiler-prev .body{padding:0 12px 10px;font-size:12px;color:#444;white-space:pre-wrap;line-height:1.5}
  .strat{display:grid;grid-template-columns:1fr 180px;gap:10px;align-items:start;padding:8px 0;border-bottom:1px solid #eef1f3}
  .strat .t{font-size:12.5px}
  .strat .t .num{font-weight:700;color:var(--verde)}
  .strat select{font-size:12px;padding:6px}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0}
  .chk input{width:auto}

  /* ---- Document preview (right panel) ---- */
  .live-bar{flex:none;display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(255,255,255,.72);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid var(--linea);flex-wrap:wrap}
  .live-bar .t{font-size:11.5px;color:var(--gris);flex:1;min-width:100px}
  #docScroll{flex:1;overflow:auto;padding:20px 16px}
  #docScroll .doc{max-width:720px;padding:46px 52px;margin:0 auto}
  .seg{display:inline-flex;background:#eaecee;border-radius:var(--pill);padding:3px}
  .seg-btn{border:0;background:transparent;color:var(--gris);font-size:12px;font-weight:600;padding:5px 12px;border-radius:var(--pill);cursor:pointer;transition:.12s}
  .seg-btn.active{background:#fff;color:var(--verde);box-shadow:var(--shadow-sm)}
  body.focus-doc #leftPane{display:none}
  body.focus-doc #split{grid-template-columns:1fr}
  body.focus-doc #docScroll .doc{max-width:820px}

  /* ---- IP document ---- */
  .doc{background:#fff;font-family:"Times New Roman",Georgia,serif;color:#111;font-size:13px;line-height:1.5;box-shadow:var(--shadow-md);border-radius:6px}
  .doc h1.cover{font-size:30px;letter-spacing:8px;text-align:center;color:var(--verde);margin:40px 0 0}
  .doc .cover-sub{text-align:center;color:var(--gris);font-size:14px;margin:6px 0 30px}
  .doc .cover-box{border:2px solid var(--verde);border-radius:10px;padding:24px;text-align:center;margin:30px 0}
  .doc .cover-box .proj{font-size:20px;font-weight:bold;margin:6px 0}
  .doc h2{font-size:16px;color:var(--verde);border-bottom:2px solid var(--verde);padding-bottom:3px;margin-top:26px}
  .doc h3{font-size:14px;color:#17533a;margin-top:18px}
  .doc h4{font-size:13px;color:#333;margin-top:12px}
  .doc p{margin:7px 0;text-align:justify}
  .doc table{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px}
  .doc th,.doc td{border:1px solid #999;padding:5px 7px;text-align:left;vertical-align:top}
  .doc th{background:var(--verde-claro)}
  .doc .instr{background:#FFE8A3;border-left:4px solid var(--amber);padding:7px 11px;font-size:11.5px;font-style:italic;color:#5b4600;margin:8px 0}
  .doc .toc-line{display:flex;justify-content:space-between;border-bottom:1px dotted #bbb;font-size:12px;padding:2px 0}
  .doc .firma{margin-top:40px;display:flex;justify-content:space-between;gap:30px}
  .doc .firma div{flex:1;text-align:center;border-top:1px solid #333;padding-top:6px;font-size:12px}
  .doc .hl-new{background:#FFF59D;border-radius:2px}
  .doc .hl-new p{background:transparent}
  .doc .hl-new p:first-child{margin-top:0}
  .doc.modo-borrador .hl-new{background:#FFF59D;display:block;padding:1px 4px;margin:6px 0}
  .doc .pend-tag{color:var(--amber);font-style:italic;font-weight:400;font-size:10.5px;margin-left:8px}
  .doc table.tbl-new th{background:#FFF1A8}
  .doc table.tbl-new td{background:#FFFDE7}
  .doc table.tbl-scaffold th,.doc table.tbl-scaffold td{border:1px dashed var(--amber)}
  .doc td.band{background:#d7e8dc;font-weight:bold}
  .doc .figbox{border:2px dashed var(--amber);background:#FFF8E1;text-align:center;padding:26px 12px;margin:12px 0;border-radius:6px}
  .doc .figicon{font-size:38px;line-height:1;filter:grayscale(.2)}
  .doc .figcap{font-size:12px;color:#5b4600;font-style:italic;margin-top:8px}
  .doc .figimg{margin:16px 0}
  .doc .figimg img{width:100%;display:block;border-radius:3px}
  .doc .figimg figcaption{font-size:12px;color:#444;font-style:italic;margin-top:7px;text-align:center}
  .doc .tbl-title{margin:14px 0 4px}
  .doc h2.chap{font-size:19px;border-bottom:3px solid var(--verde);page-break-before:always}
  .doc ul.refs li{font-size:11px;margin:3px 0}
  .doc .cover-page{text-align:center;padding-bottom:30px;border-bottom:1px solid #eee}

  /* ---- Figuras en el editor ---- */
  .figarea{border:1px solid var(--linea);border-radius:6px;padding:10px 12px;margin:12px 0;background:#fbfdfc}
  .figarea-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .figarea-t{font-size:12px;font-weight:700;color:var(--verde)}
  .figadd{border:1px solid #cfe0d6;background:var(--verde-tint);color:var(--verde);font-size:11.5px;font-weight:600;border-radius:4px;padding:5px 10px;cursor:pointer}
  .figadd:hover{background:#d7e6dd}
  .figarea-note{font-size:11px;color:#7a6116;background:var(--amber-bg);border-radius:4px;padding:5px 8px;margin-bottom:6px}
  .figarea-empty{font-size:11.5px;color:var(--gris);font-style:italic;padding:2px 0}
  .figrow{display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-top:1px solid #eef1ef}
  .figrow:first-of-type{border-top:0}
  .figthumb{width:74px;height:56px;flex:none;border:1px dashed var(--amber);border-radius:5px;background:#FFF8E1;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
  .figthumb.has{border:1px solid var(--linea);background:#fff}
  .figthumb span{font-size:22px;opacity:.7}
  .figthumb img{width:100%;height:100%;object-fit:cover}
  .figmeta{flex:1;min-width:0}
  .figtitle-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .fignum{font-size:12px;font-weight:700;color:var(--verde);white-space:nowrap}
  .figtitle{flex:1;min-width:0;padding:6px 9px;border:1px solid var(--linea);border-radius:5px;font-size:12.5px;font-family:inherit;background:#fff}
  .figtitle:focus{outline:none;border-color:var(--verde2);box-shadow:0 0 0 3px rgba(23,83,58,.12)}
  .figacts{display:flex;gap:14px;flex-wrap:wrap}
  .imglink{font-size:11.5px;color:var(--verde);font-weight:600;cursor:pointer}
  .imglink:hover{text-decoration:underline}
  .imglink.danger{color:#b3261e}

  /* ---- Toast ---- */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(16,32,24,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);color:#fff;padding:11px 20px;border-radius:var(--pill);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);opacity:0;transition:.25s;z-index:400}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---- Modales ---- */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:310;background:rgba(10,20,15,.4);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);padding:48px 16px 24px;overflow-y:auto}
  .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
  .modal-panel{background:#fff;border-radius:18px;width:100%;max-width:740px;box-shadow:0 24px 80px rgba(0,0,0,.22);overflow:hidden;margin:auto}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 16px;border-bottom:1px solid var(--linea)}
  .modal-header h2{margin:0;font-size:16px;font-weight:700;color:var(--tinta)}
  .modal-close{border:none;background:transparent;font-size:20px;cursor:pointer;color:var(--gris);padding:4px 9px;border-radius:8px;line-height:1;transition:.15s}
  .modal-close:hover{background:var(--verde-claro);color:var(--tinta)}
  .modal-body{padding:20px 24px;max-height:72vh;overflow-y:auto}

  /* ---- Responsive ---- */
  @media(max-width:1100px){
    #split{grid-template-columns:1fr;height:auto}
    #leftPane{overflow:visible}
    #rightPane{height:80vh;border-left:0;border-top:1px solid var(--linea)}
  }
  @media(max-width:600px){
    main{padding:14px 12px 32px}
    header.app h1{font-size:13px}
    .btn-toc .toc-lbl{display:none}
    #docScroll .doc{padding:28px 18px}
  }
</style>
</head>
<body>
<header class="app">
  <div class="brand">
    <img class="mark" src="favicon.svg" alt="VerdeRaíz">
    <div>
      <h1>Informe Preventivo ASEA</h1>
      <div class="sub">Verde Raíz · Sector Hidrocarburos</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="hdr-actions">
    <button class="icon-btn" id="btnGuia" title="Guía de uso">📖</button>
    <button class="icon-btn" id="btnChecklist" title="Checklist ASEA-00-041">✅</button>
    <button class="icon-btn" id="btnAnexosRef" title="Referencias / Anexos">📎</button>
    <button class="btn ghost" id="btnGuardar" title="Guardar proyecto">💾</button>
    <button class="btn ghost" id="btnCargar" title="Cargar proyecto">📂</button>
    <button class="btn" id="btnWord">⬇ Word</button>
    <button class="btn ghost" id="btnVista" title="Enfocar documento">⛶</button>
  </div>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</header>

<div id="split">
  <div id="leftPane">
    <!-- TOC Drawer -->
    <nav class="toc" id="toc">
      <div class="toc-close-row"><button class="toc-close" id="btnTocClose">✕</button></div>
    </nav>
    <div class="toc-backdrop" id="tocBackdrop"></div>

    <!-- Sticky progress bar -->
    <div class="lp-topbar">
      <button class="btn-toc" id="btnToc">☰ <span class="toc-lbl">Índice</span></button>
      <div class="prog-wrap">
        <div class="prog-text" id="progText">Cargando…</div>
        <div class="progress"><div id="progBar"></div></div>
      </div>
    </div>

    <!-- Form -->
    <main>
      <div id="form"></div>
    </main>
  </div>

  <div id="rightPane">
    <div class="live-bar">
      <div class="seg">
        <button class="seg-btn active" data-modo="borrador">📝 Borrador</button>
        <button class="seg-btn" data-modo="final">📄 Limpio</button>
      </div>
      <span class="t" id="prevInfo"></span>
      <button class="btn sm" onclick="window.print()">🖨 PDF</button>
      <button class="btn sm" id="btnWordLimpio">⬇ Word limpio</button>
    </div>
    <div id="docScroll"><div class="doc modo-borrador" id="doc"></div></div>
  </div>
</div>

<!-- Modales de utilidades del sistema -->
<div class="modal-overlay" id="modalGuia">
  <div class="modal-panel">
    <div class="modal-header">
      <h2>📖 Guía de uso — Sistema IP 2026</h2>
      <button class="modal-close" data-close="modalGuia">✕</button>
    </div>
    <div class="modal-body" id="modalGuiaBody"></div>
  </div>
</div>
<div class="modal-overlay" id="modalChecklist">
  <div class="modal-panel">
    <div class="modal-header">
      <h2>✅ Checklist ASEA-00-041</h2>
      <button class="modal-close" data-close="modalChecklist">✕</button>
    </div>
    <div class="modal-body" id="modalChecklistBody"></div>
  </div>
</div>
<div class="modal-overlay" id="modalAnexos">
  <div class="modal-panel">
    <div class="modal-header">
      <h2>📎 Referencias y Anexos del proyecto</h2>
      <button class="modal-close" data-close="modalAnexos">✕</button>
    </div>
    <div class="modal-body" id="modalAnexosBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="sistema.js"></script>
<script src="documento.js"></script>
<script src="app.js"></script>
</body>
</html>
