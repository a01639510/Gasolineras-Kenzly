<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verde Raíz — Informes Preventivos ASEA</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="logo.png">
<meta name="theme-color" content="#0e3b29">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#0f6b46;--verde2:#0c5638;--verde-claro:#f2f4f3;--verde-tint:#e9f3ee;
    --gris:#6b7280;--linea:#ececef;--bg:#fbfbfc;--surface:#ffffff;
    --amber:#9a7b1f;--amber-bg:#fbf6e7;--azul:#1f4e79;--tinta:#18181b;
    --radius:14px;--radius-sm:10px;--pill:999px;
    --shadow-sm:0 1px 3px rgba(20,20,30,.06);--shadow-md:0 10px 30px rgba(20,20,40,.10);
    --hdr:52px;--topbar:42px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;color:var(--tinta);background:var(--bg);-webkit-font-smoothing:antialiased;letter-spacing:-.01em}

  /* ============ ICONOS SVG ============ */
  /* (sprite, invisible) */

  /* ============ HEADER ============ */
  header.app{background:rgba(255,255,255,.9);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);padding:8px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--linea);height:var(--hdr)}
  header.app .brand{display:flex;align-items:center;gap:9px}
  header.app .mark{height:30px;width:30px;flex:none;border-radius:8px}
  header.app h1{font-size:13.5px;margin:0;font-weight:700;color:var(--tinta)}
  header.app .sub{font-size:10.5px;color:var(--gris);margin-top:1px}
  header.app .spacer{flex:1}
  header.app .hdr-actions{display:flex;align-items:center;gap:5px}

  /* ============ BUTTONS ============ */
  .btn{border:1px solid var(--linea);border-radius:var(--pill);padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--tinta);transition:.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .btn:hover{box-shadow:var(--shadow-sm);border-color:#d0d0d4}
  .btn:active{transform:translateY(1px)}
  .btn.sm{padding:4px 9px;font-size:11.5px}
  .btn.ghost{background:transparent;color:var(--gris);border-color:var(--linea)}
  .btn.ghost:hover{background:var(--verde-claro);color:var(--tinta)}
  .btn.primary{background:var(--verde);color:#fff;border-color:transparent}
  .btn.primary:hover{background:var(--verde2)}
  .icon-btn{width:30px;height:30px;border-radius:50%;padding:0;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--linea);background:var(--surface);cursor:pointer;transition:.15s;flex:none;color:var(--gris)}
  .icon-btn:hover{background:var(--verde-claro);color:var(--verde);border-color:#cfe0d6}

  /* ============ SPLIT EDITOR ============ */
  #split{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - var(--hdr))}
  #leftPane{overflow:hidden;background:var(--bg);display:grid;grid-template-rows:var(--topbar) 1fr}
  .lp-topbar{background:rgba(251,251,252,.97);border-bottom:1px solid var(--linea);padding:7px 14px;display:flex;align-items:center;gap:10px;overflow:hidden}
  .prog-wrap{flex:1;min-width:0}
  .prog-text{font-size:11px;font-weight:600;color:var(--tinta);margin-bottom:3px}
  .prog-section{font-size:10.5px;color:var(--verde);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;flex:none;display:none}
  .prog-section.visible{display:block}
  .progress{height:4px;background:#e6ece8;border-radius:var(--pill);overflow:hidden}
  .progress>div{height:100%;background:linear-gradient(90deg,var(--verde2),var(--verde));width:0;transition:width .4s;border-radius:var(--pill)}
  .lp-body{display:grid;grid-template-columns:200px 1fr;overflow:hidden;height:100%}
  nav.toc{height:100%;overflow-y:auto;border-right:1px solid var(--linea);padding:8px 5px 20px;background:transparent}
  nav.toc a{display:flex;align-items:center;padding:5px 9px;font-size:11.5px;color:var(--gris);text-decoration:none;border-radius:7px;margin:1px 0;transition:.12s}
  nav.toc a:hover{background:var(--verde-claro);color:var(--tinta)}
  nav.toc a.active{color:var(--verde);font-weight:650;background:var(--verde-tint)}
  nav.toc .grp{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:#9aa9a0;padding:12px 9px 4px;font-weight:700}
  .toc-dot{display:inline-block;width:6px;height:6px;border-radius:50%;flex:none;margin-right:6px;flex-shrink:0}
  .toc-dot.green{background:#22c55e}
  .toc-dot.yellow{background:#f59e0b}
  main{height:100%;overflow-y:auto;padding:16px 18px 40px;min-width:0}

  /* ============ FORM ============ */
  section.card{background:var(--surface);border:1px solid var(--linea);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;scroll-margin-top:10px;box-shadow:var(--shadow-sm)}
  section.card>h2{margin:0 0 3px;font-size:14.5px;color:var(--verde);font-weight:700}
  section.card>.desc{font-size:11.5px;color:var(--gris);margin:5px 0 14px;line-height:1.55}
  .field{margin-bottom:13px}
  .field label{display:flex;align-items:center;font-size:12px;font-weight:600;margin-bottom:4px}
  .field .hint{font-size:10.5px;color:var(--gris);font-weight:400;margin-left:5px}
  .field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--linea);border-radius:var(--radius-sm);font-size:12.5px;font-family:inherit;background:#fbfdfc;transition:.15s;color:var(--tinta)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--verde2);box-shadow:0 0 0 3px rgba(26,109,74,.1);background:#fff}
  .field textarea{min-height:60px;resize:vertical}
  .field.falta input,.field.falta select{border-left:3px solid #f59e0b;background:#fffcf0}
  .field.falta label::after{content:"";display:inline-block;width:5px;height:5px;border-radius:50%;background:#f59e0b;margin-left:5px;flex:none}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:var(--pill);text-transform:uppercase;letter-spacing:.4px;vertical-align:middle;margin-left:4px;border:1px solid transparent}
  .badge.cerrada{background:#eaf1f8;color:var(--azul);border-color:#d4e2f0}
  .badge.boiler{background:var(--verde-tint);color:var(--verde);border-color:#cfe0d6}
  .badge.abierta{background:var(--amber-bg);color:#7a6116;border-color:#ecdcae}
  .open-note{background:var(--amber-bg);border:1px solid #ecdcae;border-radius:var(--radius-sm);padding:9px 11px;font-size:11.5px;color:#6b5300;margin-bottom:11px;line-height:1.5}
  details.boiler-prev{margin-top:5px;border:1px solid var(--linea);border-radius:6px;background:#fafcfb}
  details.boiler-prev summary{cursor:pointer;padding:6px 9px;font-size:11.5px;color:var(--verde);font-weight:600}
  details.boiler-prev .body{padding:0 11px 9px;font-size:11.5px;color:#444;white-space:pre-wrap;line-height:1.5}
  .strat{display:grid;grid-template-columns:1fr 150px;gap:8px;align-items:start;padding:6px 0;border-bottom:1px solid #eef1f3}
  .strat .t{font-size:11.5px}.strat .t .num{font-weight:700;color:var(--verde)}
  .strat select{font-size:11.5px;padding:4px}
  .chk{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:4px 0}
  .chk input{width:auto}

  /* ============ RIGHT PANEL ============ */
  #rightPane{display:flex;flex-direction:column;overflow:hidden;background:#f4f5f6;border-left:1px solid var(--linea);position:relative}
  .live-bar{flex:none;display:flex;align-items:center;gap:6px;padding:6px 11px;background:rgba(255,255,255,.75);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid var(--linea);flex-wrap:wrap}
  .live-bar .t{font-size:10.5px;color:var(--gris);flex:1;min-width:80px}
  #docScroll{flex:1;overflow:auto;padding:16px 12px}
  #docScroll .doc{max-width:720px;padding:42px 48px;margin:0 auto}
  .seg{display:inline-flex;background:#eaecee;border-radius:var(--pill);padding:2px}
  .seg-btn{border:0;background:transparent;color:var(--gris);font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--pill);cursor:pointer;transition:.12s}
  .seg-btn.active{background:#fff;color:var(--verde);box-shadow:var(--shadow-sm)}

  /* ============ DOC TOC FLOTANTE ============ */
  .doc-toc-panel{position:absolute;top:42px;left:0;width:260px;background:#fff;border:1px solid var(--linea);border-radius:12px;box-shadow:var(--shadow-md);z-index:40;padding:5px 0;max-height:60vh;overflow-y:auto;display:none}
  .doc-toc-panel.open{display:block}
  .doc-toc-panel a{display:block;padding:5px 14px;font-size:11.5px;color:#444;text-decoration:none;cursor:pointer;transition:.1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .doc-toc-panel a:hover{background:var(--verde-claro);color:var(--verde)}
  .doc-toc-panel a.l3{padding-left:24px;font-size:11px;color:var(--gris)}
  .doc-toc-panel .dtoc-hdr{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#aaa;padding:9px 14px 3px;font-weight:700}

  /* ============ FOCUS MODE ============ */
  body.focus-doc #leftPane{display:none}
  body.focus-doc #split{grid-template-columns:1fr}
  body.focus-doc #docScroll .doc{max-width:800px}

  /* ============ IP DOCUMENT ============ */
  .doc{background:#fff;font-family:"Times New Roman",Georgia,serif;color:#111;font-size:13px;line-height:1.5;box-shadow:var(--shadow-md);border-radius:6px}
  .doc h1.cover{font-size:30px;letter-spacing:8px;text-align:center;color:var(--verde);margin:40px 0 0}
  .doc .cover-sub{text-align:center;color:var(--gris);font-size:14px;margin:6px 0 30px}
  .doc .cover-box{border:2px solid var(--verde);border-radius:10px;padding:24px;text-align:center;margin:30px 0}
  .doc .cover-box .proj{font-size:20px;font-weight:bold;margin:6px 0}
  .doc h2{font-size:16px;color:var(--verde);border-bottom:2px solid var(--verde);padding-bottom:3px;margin-top:26px}
  .doc h3{font-size:14px;color:#17533a;margin-top:18px}
  .doc h4{font-size:13px;color:#333;margin-top:12px}
  .doc p{margin:7px 0;text-align:justify}
  .doc table{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px}
  .doc th,.doc td{border:1px solid #999;padding:5px 7px;text-align:left;vertical-align:top}
  .doc th{background:var(--verde-claro)}
  .doc .instr{background:#FFE8A3;border-left:4px solid var(--amber);padding:7px 11px;font-size:11.5px;font-style:italic;color:#5b4600;margin:8px 0}
  .doc .toc-line{display:flex;justify-content:space-between;border-bottom:1px dotted #bbb;font-size:12px;padding:2px 0}
  .doc .firma{margin-top:40px;display:flex;justify-content:space-between;gap:30px}
  .doc .firma div{flex:1;text-align:center;border-top:1px solid #333;padding-top:6px;font-size:12px}
  .doc .hl-new{background:#FFF59D;border-radius:2px}
  .doc .hl-new p{background:transparent}
  .doc.modo-borrador .hl-new{background:#FFF59D;display:block;padding:1px 4px;margin:6px 0}
  .doc .pend-tag{color:var(--amber);font-style:italic;font-weight:400;font-size:10.5px;margin-left:8px}
  .doc table.tbl-new th{background:#FFF1A8}.doc table.tbl-new td{background:#FFFDE7}
  .doc table.tbl-scaffold th,.doc table.tbl-scaffold td{border:1px dashed var(--amber)}
  .doc td.band{background:#d7e8dc;font-weight:bold}
  .doc .figbox{border:2px dashed var(--amber);background:#FFF8E1;text-align:center;padding:26px 12px;margin:12px 0;border-radius:6px}
  .doc .figicon{font-size:36px;line-height:1}
  .doc .figcap{font-size:12px;color:#5b4600;font-style:italic;margin-top:8px}
  .doc .figimg{margin:16px 0}
  .doc .figimg img{width:100%;display:block;border-radius:3px}
  .doc .figimg figcaption{font-size:12px;color:#444;font-style:italic;margin-top:7px;text-align:center}
  .doc .tbl-title{margin:14px 0 4px}
  .doc h2.chap{font-size:19px;border-bottom:3px solid var(--verde);page-break-before:always}
  .doc ul.refs li{font-size:11px;margin:3px 0}
  .doc .cover-page{text-align:center;padding-bottom:30px;border-bottom:1px solid #eee}

  /* ============ FIGURAS EDITOR ============ */
  .figarea{border:1px solid var(--linea);border-radius:6px;padding:9px 11px;margin:10px 0;background:#fbfdfc}
  .figarea-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
  .figarea-t{font-size:11.5px;font-weight:700;color:var(--verde)}
  .figadd{border:1px solid #cfe0d6;background:var(--verde-tint);color:var(--verde);font-size:11px;font-weight:600;border-radius:4px;padding:4px 9px;cursor:pointer}
  .figadd:hover{background:#d7e6dd}
  .figarea-note{font-size:10.5px;color:#7a6116;background:var(--amber-bg);border-radius:4px;padding:4px 7px;margin-bottom:5px}
  .figarea-empty{font-size:11px;color:var(--gris);font-style:italic;padding:2px 0}
  .figrow{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-top:1px solid #eef1ef}
  .figrow:first-of-type{border-top:0}
  .figthumb{width:68px;height:52px;flex:none;border:1px dashed var(--amber);border-radius:5px;background:#FFF8E1;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
  .figthumb.has{border:1px solid var(--linea);background:#fff}
  .figthumb span{font-size:20px;opacity:.7}
  .figthumb img{width:100%;height:100%;object-fit:cover}
  .figmeta{flex:1;min-width:0}
  .figtitle-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
  .fignum{font-size:11.5px;font-weight:700;color:var(--verde);white-space:nowrap}
  .figtitle{flex:1;min-width:0;padding:5px 8px;border:1px solid var(--linea);border-radius:5px;font-size:12px;font-family:inherit;background:#fff}
  .figtitle:focus{outline:none;border-color:var(--verde2);box-shadow:0 0 0 3px rgba(23,83,58,.12)}
  .figacts{display:flex;gap:12px;flex-wrap:wrap}
  .imglink{font-size:11px;color:var(--verde);font-weight:600;cursor:pointer}
  .imglink:hover{text-decoration:underline}
  .imglink.danger{color:#b3261e}

  /* ============ ANEXOS REDESIGN ============ */
  .ax-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  @media (max-width:640px){ .ax-list{grid-template-columns:1fr} }
  .ax-item{background:#fff;border:1px solid var(--linea);border-radius:10px;padding:10px 12px;transition:.15s}
  .ax-item:hover{border-color:#d0d5dd;box-shadow:var(--shadow-sm)}
  .ax-item>summary{cursor:pointer;display:flex;align-items:center;gap:8px;list-style:none}
  .ax-item>summary::-webkit-details-marker{display:none}
  .ax-dot{width:9px;height:9px;border-radius:50%;flex:none;background:#f59e0b}
  .ax-dot.ok{background:#22c55e}
  .ax-top{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0}
  .ax-file-ico{width:32px;height:32px;border-radius:8px;background:var(--verde-tint);display:flex;align-items:center;justify-content:center;flex:none;color:var(--verde)}
  .ax-info{flex:1;min-width:0}
  .ax-nombre{font-size:12.5px;font-weight:600;color:var(--tinta)}
  .ax-usa{font-size:11px;color:var(--gris);margin-top:2px}
  .ax-link-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .ax-link-row input{flex:1;padding:6px 9px;border:1px solid var(--linea);border-radius:7px;font-size:12px;font-family:inherit;background:#fbfdfc;color:var(--tinta)}
  .ax-link-row input:focus{outline:none;border-color:var(--verde2);background:#fff}
  .ax-open{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;font-size:11.5px;font-weight:600;color:#1a73e8;text-decoration:none;background:#f0f6ff;border:1px solid #c7deff;white-space:nowrap;transition:.15s;flex:none}
  .ax-open:hover{background:#dbeafe}
  .ax-open svg{flex:none}

  /* ============ TOAST ============ */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(16,32,24,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);color:#fff;padding:10px 18px;border-radius:var(--pill);font-size:12.5px;font-weight:500;box-shadow:var(--shadow-md);opacity:0;transition:.25s;z-index:700}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ============ MODALES ============ */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:310;background:rgba(10,20,15,.4);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);padding:48px 16px 24px;overflow-y:auto}
  .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
  .modal-panel{background:#fff;border-radius:18px;width:100%;max-width:740px;box-shadow:0 24px 80px rgba(0,0,0,.22);overflow:hidden;margin:auto}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid var(--linea)}
  .modal-header h2{margin:0;font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:8px}
  .modal-close{border:none;background:transparent;font-size:20px;cursor:pointer;color:var(--gris);padding:4px 9px;border-radius:8px;line-height:1;transition:.15s}
  .modal-close:hover{background:var(--verde-claro)}
  .modal-body{padding:16px 20px;max-height:72vh;overflow-y:auto}

  /* ============ HOME VIEW ============ */
  #homeView{position:fixed;inset:0;z-index:600;background:var(--bg);display:none;flex-direction:column}
  #homeView.visible{display:flex}
  .home-hdr{padding:22px 32px 20px;border-bottom:1px solid var(--linea);display:flex;align-items:center;gap:14px;background:#fff}
  .home-hdr img{height:42px;width:42px;border-radius:11px}
  .home-hdr-txt h1{font-size:18px;font-weight:700;margin:0;color:var(--tinta)}
  .home-hdr-txt p{font-size:12px;color:var(--gris);margin:3px 0 0}
  .home-body{flex:1;overflow-y:auto;padding:28px 32px}
  .home-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gris);margin:0 0 16px}
  .home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;max-width:1100px}
  .ip-card{background:#fff;border:1px solid var(--linea);border-radius:14px;padding:18px 16px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;gap:6px;min-height:150px;position:relative}
  .ip-card:hover{box-shadow:var(--shadow-md);border-color:#c5cad2;transform:translateY(-2px)}
  .ip-card.new{border:2px dashed #d0d5dd;background:transparent;align-items:center;justify-content:center;color:var(--gris);gap:10px}
  .ip-card.new:hover{border-color:var(--verde);color:var(--verde);background:var(--verde-tint)}
  .ip-card.new .new-plus{width:44px;height:44px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center}
  .ip-card.new .new-lbl{font-size:12.5px;font-weight:600}
  .ipc-ico{color:var(--verde);margin-bottom:4px}
  .ipc-name{font-size:13px;font-weight:700;color:var(--tinta);line-height:1.3;word-break:break-word}
  .ipc-meta{font-size:11px;color:var(--gris)}
  .ipc-date{font-size:10.5px;color:#aaa;margin-top:auto}
  .ipc-del{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:1px solid var(--linea);background:#fff;display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s;cursor:pointer;color:var(--gris)}
  .ip-card:hover .ipc-del{opacity:1}
  .ipc-del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
  .home-empty{color:var(--gris);font-size:13px;padding:20px 0}

  @media(max-width:1100px){
    #split{grid-template-columns:1fr;height:auto}
    #leftPane{overflow:visible;display:flex;flex-direction:column}
    .lp-body{grid-template-columns:1fr}
    nav.toc{display:none}
    #rightPane{height:78vh;border-left:0;border-top:1px solid var(--linea)}
  }
  @media(max-width:600px){
    main{padding:10px 8px 28px}
    .home-body{padding:18px 16px}
    .home-hdr{padding:16px}
    #docScroll .doc{padding:24px 14px}
  }
</style>
</head>
<body>

<!-- SVG sprite -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ico-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
  <symbol id="ico-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></symbol>
  <symbol id="ico-paperclip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></symbol>
  <symbol id="ico-save" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
  <symbol id="ico-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></symbol>
  <symbol id="ico-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="m21 3-7 7"/><path d="m3 21 7-7"/></symbol>
  <symbol id="ico-bars" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
  <symbol id="ico-file-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></symbol>
  <symbol id="ico-print" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></symbol>
  <symbol id="ico-file" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></symbol>
</svg>

<!-- ============ HOME VIEW ============ -->
<div id="homeView" class="visible">
  <div class="home-hdr">
    <img src="favicon.svg" alt="Verde Raíz">
    <div class="home-hdr-txt">
      <h1>Verde Raíz — Informes Preventivos</h1>
      <p>Selecciona un proyecto o crea uno nuevo</p>
    </div>
  </div>
  <div class="home-body">
    <p class="home-section-title">Mis proyectos</p>
    <div class="home-grid" id="homeGrid"></div>
  </div>
</div>

<!-- ============ EDITOR ============ -->
<header class="app">
  <button class="icon-btn" id="btnHome" title="Inicio — todos los proyectos"><svg width="15" height="15"><use href="#ico-home"/></svg></button>
  <div class="brand">
    <img class="mark" src="favicon.svg" alt="VerdeRaíz">
    <div>
      <h1>Informe Preventivo ASEA</h1>
      <div class="sub">Verde Raíz · Sector Hidrocarburos</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="hdr-actions">
    <button class="icon-btn" id="btnGuia" title="Guía de uso"><svg width="15" height="15"><use href="#ico-book"/></svg></button>
    <button class="icon-btn" id="btnAnexosRef" title="Referencias / Anexos"><svg width="15" height="15"><use href="#ico-paperclip"/></svg></button>
    <button class="btn ghost" id="btnGuardar" style="display:none"><svg width="13" height="13"><use href="#ico-save"/></svg></button>
    <button class="btn ghost" id="btnCargar" style="display:none"><svg width="13" height="13"><use href="#ico-folder"/></svg></button>
    <button class="btn" id="btnWord"><svg width="12" height="12"><use href="#ico-file-down"/></svg> Word</button>
    <button class="btn ghost" id="btnVista"><svg width="13" height="13"><use href="#ico-expand"/></svg></button>
  </div>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</header>

<div id="split">
  <div id="leftPane">
    <div class="lp-topbar">
      <div class="prog-wrap">
        <div class="prog-text" id="progText">Cargando…</div>
        <div class="progress"><div id="progBar"></div></div>
      </div>
      <div class="prog-section" id="progSection"></div>
    </div>
    <div class="lp-body">
      <nav class="toc" id="toc"></nav>
      <main><div id="form"></div></main>
    </div>
  </div>
  <div id="rightPane">
    <div class="live-bar">
      <button class="btn sm ghost" id="btnDocToc"><svg width="13" height="13"><use href="#ico-bars"/></svg></button>
      <div class="seg">
        <button class="seg-btn active" data-modo="borrador">Borrador</button>
        <button class="seg-btn" data-modo="final">Limpio</button>
      </div>
      <span class="t" id="prevInfo"></span>
      <button class="btn sm ghost" onclick="window.print()"><svg width="12" height="12"><use href="#ico-print"/></svg> PDF</button>
      <button class="btn sm" id="btnWordLimpio"><svg width="12" height="12"><use href="#ico-file-down"/></svg> Word</button>
    </div>
    <div id="docTocPanel" class="doc-toc-panel"></div>
    <div id="docScroll"><div class="doc modo-borrador" id="doc"></div></div>
  </div>
</div>

<!-- Modales -->
<div class="modal-overlay" id="modalGuia">
  <div class="modal-panel">
    <div class="modal-header"><h2><svg width="15" height="15"><use href="#ico-book"/></svg> Guía de uso — Sistema IP 2026</h2><button class="modal-close" data-close="modalGuia">✕</button></div>
    <div class="modal-body" id="modalGuiaBody"></div>
  </div>
</div>
<div class="modal-overlay" id="modalAnexos">
  <div class="modal-panel">
    <div class="modal-header"><h2><svg width="15" height="15"><use href="#ico-paperclip"/></svg> Referencias y Anexos del proyecto</h2><button class="modal-close" data-close="modalAnexos">✕</button></div>
    <div class="modal-body" id="modalAnexosBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="data.js"></script>
<script src="sistema.js"></script>
<script src="documento.js"></script>
<script src="app.js"></script>
</body>
</html>
